<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuVi Search - Tìm kiếm Video thông minh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); }
        .result-card:hover { transform: translateY(-4px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-slate-900">

    <header class="sticky top-0 z-50 glass-effect border-b border-gray-200 py-4 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">
                    <i class="fas fa-video fa-lg"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">MuVi Search</h1>
            </div>

            <div class="relative w-full max-w-2xl">
                <input type="text" id="queryInput" placeholder="Tìm người mặc áo đỏ, chữ 'Sự kiện', tiếng đàn piano..."
                    class="w-full pl-12 pr-4 py-2.5 bg-white border border-gray-300 rounded-full focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm transition-all">
                <i class="fas fa-magic absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <button onclick="handleSearch()" id="searchBtn" class="absolute right-1.5 top-1/2 -translate-y-1/2 bg-indigo-600 text-white px-6 py-1.5 rounded-full hover:bg-indigo-700 transition font-bold text-sm">
                    Tìm kiếm
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div id="analysisPanel" class="hidden mb-8 grid grid-cols-2 lg:grid-cols-4 gap-4"></div>

        <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="col-span-full text-center py-20 text-gray-400">
                <i class="fas fa-search fa-3x mb-4 opacity-10"></i>
                <p>Nhập mô tả để bắt đầu tìm kiếm đa phương thức</p>
            </div>
        </div>
    </main>

    <script>
        async function handleSearch() {
            const query = document.getElementById('queryInput').value;
            if (!query) return;

            const grid = document.getElementById('resultsGrid');
            const analysis = document.getElementById('analysisPanel');
            const btn = document.getElementById('searchBtn');

            // Bắt đầu trạng thái tải
            grid.innerHTML = '<div class="col-span-full text-center py-20"><div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-indigo-600 border-t-transparent"></div><p class="mt-4 text-gray-500">Hệ thống đang phân tích và truy xuất...</p></div>';
            btn.disabled = true;

            try {
                const response = await fetch('/api/search/fusion', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const data = await response.json();

                // 1. Hiển thị phân tích của LLM
                analysis.innerHTML = `
                    <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 shadow-sm">
                        <span class="text-[10px] font-bold text-blue-500 uppercase tracking-widest block mb-1">Visual</span>
                        <p class="text-sm font-medium text-blue-900">${data.analysis.visual || '-'}</p>
                    </div>
                    <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-100 shadow-sm">
                        <span class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest block mb-1">OCR (${data.analysis.ocr_pos})</span>
                        <p class="text-sm font-medium text-emerald-900">${data.analysis.ocr || '-'}</p>
                    </div>
                    <div class="bg-orange-50 p-4 rounded-xl border border-orange-100 shadow-sm">
                        <span class="text-[10px] font-bold text-orange-500 uppercase tracking-widest block mb-1">Speech</span>
                        <p class="text-sm font-medium text-orange-900">${data.analysis.speech || '-'}</p>
                    </div>
                    <div class="bg-purple-50 p-4 rounded-xl border border-purple-100 shadow-sm">
                        <span class="text-[10px] font-bold text-purple-500 uppercase tracking-widest block mb-1">Audio Event</span>
                        <p class="text-sm font-medium text-purple-900">${data.analysis.audio_event || '-'}</p>
                    </div>
                `;
                analysis.classList.remove('hidden');

                // 2. Hiển thị danh sách kết quả
                if (data.results.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-center py-20 text-gray-500">Không tìm thấy kết quả nào phù hợp.</p>';
                } else {
                    grid.innerHTML = data.results.map(item => {
                        // CHUẨN HÓA ĐƯỜNG DẪN ẢNH: Đảm bảo trỏ về route /data/
                        let imgUrl = item.path;
                        if (!imgUrl.startsWith('/data/')) {
                            imgUrl = '/data/' + imgUrl.replace(/^\//, '');
                        }

                        const matchScore = Math.round((item.confidence_peak || item.fused_score || 0) * 100);

                        return `
                        <div class="result-card bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-200 hover:shadow-lg transition-all">
                            <div class="aspect-video relative bg-gray-100 overflow-hidden">
                                <img src="${imgUrl}" alt="Result Frame" class="w-full h-full object-cover"
                                     onerror="this.src='https://placehold.co/800x450/f1f5f9/94a3b8?text=Ảnh+không+tồn+tại'">
                                <div class="absolute top-3 right-3 bg-black/60 backdrop-blur-md text-white text-[10px] font-bold px-3 py-1 rounded-full">
                                    MATCH: ${matchScore}%
                                </div>
                            </div>
                            <div class="p-4">
                                <div class="flex items-center justify-between mb-3">
                                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-tight">${item.frame_id || item.video_id}</span>
                                    ${item.start_time !== undefined ? `<span class="bg-indigo-50 text-indigo-600 text-[10px] font-bold px-2 py-0.5 rounded-lg">Giây: ${item.start_time}s</span>` : ''}
                                </div>
                                ${item.text ? `<p class="text-xs text-gray-600 italic line-clamp-2 leading-relaxed mb-4">"${item.text}"</p>` : ''}
                                <button class="w-full py-2 bg-slate-900 text-white text-[11px] font-bold rounded-xl hover:bg-slate-800 active:scale-95 transition-all uppercase tracking-wide">
                                    Mở Video
                                </button>
                            </div>
                        </div>
                        `;
                    }).join('');
                }
            } catch (error) {
                console.error(error);
                grid.innerHTML = '<p class="col-span-full text-center py-20 text-red-500 font-medium">Lỗi kết nối server. Vui lòng kiểm tra lại.</p>';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Tìm kiếm';
            }
        }

        // Hỗ trợ nhấn Enter để tìm kiếm
        document.getElementById('queryInput').addEventListener('keypress', e => e.key === 'Enter' && handleSearch());
    </script>
</body>
</html>
